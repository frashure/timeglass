services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: timeglass
      POSTGRES_PASSWORD: timeglass
      POSTGRES_DB: timeglass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeglass"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://timeglass:timeglass@db:5432/timeglass
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
